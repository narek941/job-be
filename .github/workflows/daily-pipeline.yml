name: Daily Job Pipeline

on:
  schedule:
    # Run every day at 4:00 AM UTC (8:00 AM Yerevan time, UTC+4)
    - cron: "0 4 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Wake up Render service
        shell: bash
        run: |
          set -euo pipefail
          echo "Waking up service at: ${{ vars.RENDER_URL }}"

          # Poll /health until it's up (max ~10 minutes)
          for i in {1..120}; do
            RESPONSE=$(curl -sS -L --max-time 20 \
              -w "\n%{http_code}" \
              "${{ vars.RENDER_URL }}/health" || true)

            BODY=$(printf "%s" "$RESPONSE" | sed '$d')
            CODE=$(printf "%s" "$RESPONSE" | tail -n 1)

            echo "health -> $CODE"
            if [ "$CODE" = "200" ]; then
              echo "Service is awake."
              exit 0
            fi

            echo "body (first 200 chars): $(printf "%s" "$BODY" | head -c 200)"
            sleep 5
          done

          echo "❌ Service did not become healthy in time"
          exit 1

      - name: Trigger daily pipeline
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.PIPELINE_SECRET }}" ]; then
            echo "❌ PIPELINE_SECRET is EMPTY in GitHub Actions"
            exit 1
          fi

          RESPONSE=$(curl -sS -L \
            --retry 10 --retry-all-errors --retry-delay 5 \
            --max-time 120 \
            -w "\n%{http_code}" \
            -X POST \
            -H "X-Pipeline-Secret: ${{ secrets.PIPELINE_SECRET }}" \
            "${{ vars.RENDER_URL }}/pipeline/cron")

          BODY=$(printf "%s" "$RESPONSE" | sed '$d')
          HTTP_CODE=$(printf "%s" "$RESPONSE" | tail -n 1)

          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Pipeline trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Pipeline triggered successfully"
