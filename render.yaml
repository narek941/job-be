services:
  - type: web
    name: prod-job-apply
    env: docker
    envVars:
      - key: PORT
        value: "8000"
      - key: ARMAPPLY_SKIP_SCHEDULER
        value: "true"
      - key: ARMAPPLY_DATA
        value: /tmp/data
      - fromGroup: armapply-secrets

  - type: cron
    name: job-be
    schedule: "0 8 * * *" # 8 AM UTC (12 PM AMT)
    env: docker
    dockerCommand: python3 /app/armapply/cron_autopilot.py
    envVars:
      - key: ARMAPPLY_API_URL
        value: https://prod-job-apply.onrender.com
      - key: ARMAPPLY_DATA
        value: /tmp/data
      - fromGroup: armapply-secrets
