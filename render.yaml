services:
  - type: web
    name: armapply-backend
    env: python
    buildCommand: |
      pip install -r requirements.txt
      pip install -e ./applypilot-src
      playwright install --with-deps chromium
    startCommand: |
      export PYTHONPATH=$PYTHONPATH:.
      uvicorn armapply.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ARMAPPLY_DATA
        value: /tmp/data
      - fromGroup: armapply-secrets

  - type: cron
    name: daily-pipeline
    schedule: "0 8 * * *" # 8 AM UTC (12 PM AMT)
    env: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      bash daily_pipeline.sh
