services:
  - type: web
    name: armapply-backend
    env: docker
    envVars:
      - key: PORT
        value: "8000"
      - key: ARMAPPLY_DATA
        value: /tmp/data
      - fromGroup: armapply-secrets

  - type: cron
    name: daily-pipeline
    schedule: "0 8 * * *" # 8 AM UTC (12 PM AMT)
    env: docker
    startCommand: bash daily_pipeline.sh
    envVars:
      - key: ARMAPPLY_DATA
        value: /tmp/data
      - fromGroup: armapply-secrets
