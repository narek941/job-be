services:
  - type: web
    name: armapply-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ARMAPPLY_JWT_SECRET
        sync: false
      - key: PIPELINE_SECRET
        sync: false
      - key: ARMAPPLY_SEED_TEST_USER
        value: "true"
      - key: ARMAPPLY_TEST_USER_EMAIL
        sync: false
      - key: ARMAPPLY_TEST_USER_PASSWORD
        sync: false
