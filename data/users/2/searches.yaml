# ArmApply default searches — Armenia + remote (LinkedIn via JobSpy)
queries:
  - query: "senior frontend engineer"
    tier: 1
  - query: "react developer"
    tier: 1
  - query: "react native engineer"
    tier: 1
  - query: "senior react developer"
    tier: 2
  - query: "fullstack developer react"
    tier: 2
  - query: "frontend architect"
    tier: 2

locations:
  - location: "Yerevan, Armenia"
    remote: false
  - location: "Armenia"
    remote: false
  - location: "Remote"
    remote: true

location_accept:
  - yerevan
  - armenia
  - remote
  - հայաստան
  - anywhere
  - distributed

location_reject_non_remote: []

country: "worldwide"

sites:
  - linkedin
  - indeed

defaults:
  results_per_site: 60
  hours_old: 168

staff_am:
  enabled: true
  max_pages_per_keyword: 2
  extra_keywords: []

# Публичные каналы: username без @ (пример: itjobsam). Включите enabled: true и список каналов.
telegram_channels:
  enabled: true
  max_pages_per_channel: 3
  channels:
    - rabotadlaqa
    - freeIT_job
    - vgrecruitingit
    - jun_qa
  keyword_filter:
    - armenia
    - yerevan
    - remote
    - developer
    - engineer
    - python
    - backend
    - frontend
    - vacancy
    - job

exclude_titles: []
