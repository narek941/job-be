# ArmApply default searches — Armenia + remote (LinkedIn via JobSpy)
queries:
  - query: "software engineer"
    tier: 1
  - query: "developer"
    tier: 1
  - query: "ծրագրավորող"
    tier: 2
  - query: "full stack"
    tier: 2
  - query: "Python developer"
    tier: 2

locations:
  - location: "Yerevan, Armenia"
    remote: false
  - location: "Armenia"
    remote: false
  - location: "Remote"
    remote: true

location_accept:
  - yerevan
  - armenia
  - remote
  - հայաստան
  - anywhere
  - distributed

location_reject_non_remote: []

country: "ARM"

sites:
  - linkedin
  - indeed

defaults:
  results_per_site: 60
  hours_old: 168

staff_am:
  enabled: true
  max_pages_per_keyword: 2
  extra_keywords: []

# Публичные каналы: username без @ (пример: itjobsam). Включите enabled: true и список каналов.
telegram_channels:
  enabled: false
  max_pages_per_channel: 2
  channels: []
  keyword_filter:
    - вакансия
    - vacancy
    - job
    - remote
    - developer
    - ծրագրավորող

exclude_titles: []
